<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross.porn</title>

<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">

</head>

<body>

<!-- 🔝 TOPBAR -->
<header class="topbar">
  
  <div class="left logo-wrap">
    <img src="logo.png" class="logo">
    <span class="brand">Cross.porn</span>
  </div>

  <div class="right">
    <button class="icon-btn">🔍</button>
    <button class="icon-btn" id="profileBtn">👤</button>
    <button class="icon-btn">☰</button>
  </div>

</header>


<!-- 🔎 SEARCH -->
<section class="search-section">
  <input type="text" id="urlInput" placeholder="Paste video link...">
  <button id="addBtn">Add</button>
</section>


<!-- 🏷️ TAGS -->
<section class="tags">
  <button class="tag">HD</button>
  <button class="tag">4K</button>
  <button class="tag">Best</button>
  <button class="tag">Newest</button>
  <button class="tag">Pornstars</button>
</section>


<!-- 📢 AD -->
<section class="ad-banner">
  <span>ADVERTISEMENT</span>
</section>


<!-- 🎬 GRID -->
<main id="videoGrid" class="grid"></main>


<!-- 👤 HIDDEN UPLOAD -->
<input type="file" id="uploadInput" accept="image/*,video/*" hidden>


<!-- 🍪 COOKIE -->
<div class="cookie-bar" id="cookieBar">
  <span>We use cookies to improve your experience</span>
  <button id="acceptCookie">OK</button>
</div>


<script src="script.js"></script>

</body>
</html>
