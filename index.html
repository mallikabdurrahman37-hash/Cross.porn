<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Link Preview</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 15px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #6c5ce7;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #a29bfe;
}

.loader {
  margin-top: 20px;
  display: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.preview {
  margin-top: 20px;
  display: none;
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.preview:hover {
  transform: scale(1.03);
}

.preview img {
  width: 100%;
}

.title {
  padding: 10px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="container">
  <h2>⚡ Link Preview Pro</h2>

  <input type="text" id="urlInput" placeholder="Paste video link...">
  <button onclick="getPreview()">Load Preview</button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Loading preview...</p>
  </div>

  <div class="preview" id="previewBox" onclick="openLink()">
    <img id="thumbnail">
    <div class="title" id="title"></div>
  </div>
</div>

<script>
let currentUrl = "";

async function getPreview() {
  const url = document.getElementById("urlInput").value;
  if (!url) return alert("Enter a link!");

  currentUrl = url;

  document.getElementById("previewBox").style.display = "none";
  document.getElementById("loader").style.display = "block";

  try {
    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    setTimeout(() => {
      document.getElementById("thumbnail").src = data.data.image.url;
      document.getElementById("title").innerText = data.data.title;

      document.getElementById("loader").style.display = "none";
      document.getElementById("previewBox").style.display = "block";
    }, 800); // smooth delay for realistic loading

  } catch (err) {
    document.getElementById("loader").style.display = "none";
    alert("Failed to load preview 😢");
  }
}

function openLink() {
  window.open(currentUrl, "_blank");
}
</script>

</body>
</html>
